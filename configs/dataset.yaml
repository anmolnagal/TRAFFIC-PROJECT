# If you have labels, create:
# - data/train_labels/*.txt
# - data/val_labels/*.txt
# in YOLO format (class x_center y_center width height) normalized to [0,1].
#
# If your labels live next to images (same folder), you can instead set:
# train: train_images
# val: val_images
# and ensure .txt files sit next to each .jpg with the same base name.

